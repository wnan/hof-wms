services:
  redis:
    image: redis:7-alpine
    container_name: hof-wms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    container_name: hof-wms-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15

  auth-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_NAME: auth-service
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: hof-wms
      DB_USER: insightowl
      DB_PASSWORD: insightowl
      REDIS_HOST: redis
      REDIS_PORT: 6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  master-data-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_NAME: master-data-service
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: hof-wms
      DB_USER: insightowl
      DB_PASSWORD: insightowl
      REDIS_HOST: redis
      REDIS_PORT: 6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  inbound-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_NAME: inbound-service
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: hof-wms
      DB_USER: insightowl
      DB_PASSWORD: insightowl
      REDIS_HOST: redis
      REDIS_PORT: 6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  outbound-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_NAME: outbound-service
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: hof-wms
      DB_USER: insightowl
      DB_PASSWORD: insightowl
      REDIS_HOST: redis
      REDIS_PORT: 6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  inventory-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_NAME: inventory-service
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: hof-wms
      DB_USER: insightowl
      DB_PASSWORD: insightowl
      REDIS_HOST: redis
      REDIS_PORT: 6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  integration-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_NAME: integration-service
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: hof-wms
      DB_USER: insightowl
      DB_PASSWORD: insightowl
      REDIS_HOST: redis
      REDIS_PORT: 6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  report-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_NAME: report-service
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: hof-wms
      DB_USER: insightowl
      DB_PASSWORD: insightowl
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ELASTICSEARCH_URIS: http://elasticsearch:9200
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  ai-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_NAME: ai-service
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: hof-wms
      DB_USER: insightowl
      DB_PASSWORD: insightowl
      REDIS_HOST: redis
      REDIS_PORT: 6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  gateway-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_NAME: gateway-service
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      MASTER_DATA_SERVICE_URL: http://master-data-service:8082
      INBOUND_SERVICE_URL: http://inbound-service:8083
      OUTBOUND_SERVICE_URL: http://outbound-service:8084
      INVENTORY_SERVICE_URL: http://inventory-service:8085
      INTEGRATION_SERVICE_URL: http://integration-service:8086
      REPORT_SERVICE_URL: http://report-service:8087
      AI_SERVICE_URL: http://ai-service:8088
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - master-data-service
      - inbound-service
      - outbound-service
      - inventory-service
      - integration-service
      - report-service
      - ai-service

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - gateway-service

volumes:
  redis-data:
  es-data:
