server:
  port: 8086

spring:
  application:
    name: integration-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hof-wms}
    username: ${DB_USER:insightowl}
    password: ${DB_PASSWORD:insightowl}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  quartz:
    job-store-type: memory
    auto-startup: true
    properties:
      org.quartz.scheduler.instanceName: hof-wms-scheduler
      org.quartz.threadPool.threadCount: 5

sellfox:
  client-id: ${SELLFOX_CLIENT_ID:}
  client-secret: ${SELLFOX_CLIENT_SECRET:}
  sign-key: ${SELLFOX_SIGN_KEY:}
  base-url: ${SELLFOX_BASE_URL:https://openapi.sellfox.com}
